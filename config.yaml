# ================================================================================
#  Multi-Domain Reward Model Pipeline — Configuration
# ================================================================================
#  Change model_path and model_family in each stage before running.
#
#  ┌──────────────────────────────────────────────────────────────────────────┐
#  │ Available models                                                         │
#  ├─────────┬────────────────────────────────┬───────────────────────────────┤
#  │ Family  │ model_path                     │ output_model_name             │
#  ├─────────┼────────────────────────────────┼───────────────────────────────┤
#  │ llama3  │ sfairXC/FsfairX-LLaMA3-RM-v0.1 │ multi-domain-rm-llama-3-8b-it │
#  │ gemma2  │ sfairXC/FsfairX-Gemma2-RM-v0.1 │ multi-domain-rm-gemma-2-9b-it │
#  │ qwen3   │ nvidia/Qwen3-Nemotron-8B-BRRM  │ multi-domain-rm-qwen-3-8b-it  │
#  └─────────┴────────────────────────────────┴───────────────────────────────┘
# ================================================================================


# --- Stage 1: Multi-objective regression ---

stage_1_prepare:
  model_path: sfairXC/FsfairX-LLaMA3-RM-v0.1
  model_family: llama3
  dataset_path: data/Multi-Domain-Data-Scoring
  output_dataset_name: Multi-Domain-Data-Scoring
  dataset_split: train
  n_shards: 1
  shard_idx: 1
  device: 0

stage_1_train:
  model_path: sfairXC/FsfairX-LLaMA3-RM-v0.1
  model_family: llama3
  multi_objective_dataset_name: Multi-Domain-Data-Scoring
  dataset_split: train
  embeddings_dir: null
  output_dir: null


# --- Stage 2: Gating network ---
#
#  Run stage_2_prepare once per dataset, changing dataset_path and
#  output_dataset_name each time:
#
#  Dataset         │ dataset_path                              │ output_dataset_name                │ dataset_split
#  ────────────────┼───────────────────────────────────────────┼────────────────────────────────────┼──────────────
#  multi-objective │ data/Multi-Domain-Data-Scoring            │ Multi-Domain-Data-Scoring          │ train
#  preference      │ data/Multi-Domain-Data-Preference-Pairs   │ Multi-Domain-Data-Preference-Pairs │ train
#  reference       │ RLHFlow/UltraFeedback-preference-standard │ UltraFeedback-preference-standard  │ train
#  reward-bench    │ allenai/reward-bench                      │ reward-bench                       │ filtered

stage_2_prepare:
  model_path: sfairXC/FsfairX-LLaMA3-RM-v0.1
  model_family: llama3
  dataset_path: data/Multi-Domain-Data-Preference-Pairs
  output_dataset_name: Multi-Domain-Data-Preference-Pairs
  dataset_split: train
  source: null
  n_shards: 1
  shard_idx: 1
  device: 0
  seq_len: 8192

stage_2_train:
  model_path: sfairXC/FsfairX-LLaMA3-RM-v0.1
  model_family: llama3
  multi_objective_dataset_name: Multi-Domain-Data-Scoring
  preference_dataset_name: Multi-Domain-Data-Preference-Pairs
  reference_dataset_name: null
  dataset_split: train
  eval: reward-bench
  eval_split: filtered
  device: "0"
  learning_rate: 0.001
  weight_decay: 0.0
  n_steps: 2000
  batch_size: 1024
  debiasing_dim: -1  # Disabled: set to the attribute index to decorrelate from
  corr_threshold: 0.03
  logit_scale: 1.0
  temperature: 10.0
  n_hidden: 3
  hidden_size: 1024
  dropout: 0.2
  max_samples: null
  seed: 0


# --- Stage 3: Package final model ---

stage_3_package:
  model_path: sfairXC/FsfairX-LLaMA3-RM-v0.1
  model_family: llama3
  multi_objective_dataset_name: Multi-Domain-Data-Scoring
  preference_dataset_name: Multi-Domain-Data-Preference-Pairs
  reference_dataset_name: null
  model_parent_dir: model
  output_model_name: multi-domain-rm-llama-3-8b-it


# --- Inference (evaluate and predict) ---

inference:
  model_parent_dir: model
  model_name: multi-domain-rm-llama-3-8b-it
  model_path: null


# --- Analyze attribute correlations ---

analyze_correlations:
  dataset_path: data/Multi-Domain-Data-Scoring.jsonl
  threshold: 0.5

# --- Compare models ---

benchmark:
  model_parent_dir: model
  max_samples: null
  max_length: 4096


# --- Baseline evaluation ---
#
#  Modes:
#   - no_regression + skip_scoring: native reward score, preference only (LLaMA3, Gemma2)
#   - no_regression:                native reward score, scoring + preference
#   - generative_judge + skip_scoring: generative judge, preference only (BRRM)
#   - (default):                    stage-1 regression weights, scoring only

evaluate_baseline:
  model_path: sfairXC/FsfairX-LLaMA3-RM-v0.1
  model_name: multi-domain-rm-llama-3-8b-it
  model_parent_dir: model
  scoring_data_path: data/Multi-Domain-Data-Scoring
  preference_data_path: data/Multi-Domain-Data-Preference-Pairs
  dataset_name: Multi-Domain-Data-Scoring
  max_length: 4096
  max_samples: null
  no_regression: true
  skip_scoring: false
  skip_preference: false
  generative_judge: false
  max_gen_tokens: 8192
